apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  annotations:
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
    policy.open-cluster-management.io/description: ""
    policy.open-cluster-management.io/standards: NIST SP 800-53
  name: create-tempo-bucket-secret
  namespace: policies
spec:
  dependencies:
  - apiVersion: policy.open-cluster-management.io/v1
    compliance: Compliant
    kind: Policy
    name: deploy-tempo-bucket
    namespace: policies
  disabled: false
  policy-templates:
  - objectDefinition:
      apiVersion: policy.open-cluster-management.io/v1
      kind: ConfigurationPolicy
      metadata:
        name: create-tempo-bucket-secret
      spec:
        object-templates-raw: |
          {{- $cm := (lookup "v1" "ConfigMap" "openshift-tempo" "tempo-bucket-odf") }}
          {{- $secret := (lookup "v1" "Secret" "openshift-tempo" "tempo-bucket-odf") }}
          {{- if and $cm $secret }}
          - complianceType: musthave
            objectDefinition:
              apiVersion: v1
              kind: Secret
              metadata:
                name: tempostack-dev-odf
                namespace: openshift-tempo
              type: Opaque
              stringData:
                access_key_id: {{ index $secret.data "AWS_ACCESS_KEY_ID" | base64dec }}
                access_key_secret: {{ index $secret.data "AWS_SECRET_ACCESS_KEY" | base64dec }}
                bucket: {{ $cm.data.BUCKET_NAME }}
                endpoint: https://{{ $cm.data.BUCKET_HOST }}:{{ $cm.data.BUCKET_PORT }}
          {{- end }}
        remediationAction: enforce
        severity: medium
  remediationAction: enforce
---
