apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: testapp-rbac-policy
  namespace: openshift-gitops
  annotations:
    policy.open-cluster-management.io/categories: AC Access Control
    policy.open-cluster-management.io/controls: AC-3 Access Enforcement
    policy.open-cluster-management.io/standards: NIST SP 800-53
spec:
  disabled: false
  policy-templates:
  - objectDefinition:
      apiVersion: policy.open-cluster-management.io/v1
      kind: ConfigurationPolicy
      metadata:
        name: testapp-rbac-config
      spec:
        remediationAction: enforce
        severity: medium
        object-templates:
        - complianceType: musthave
          objectDefinition:
            apiVersion: v1
            kind: Namespace
            metadata:
              name: testapp-threepilars-app
        - complianceType: musthave
          objectDefinition:
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              name: acm-argocd-admin
              namespace: testapp-threepilars-app
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: ClusterRole
              name: admin
            subjects:
            - kind: ServiceAccount
              name: acm-openshift-gitops-argocd-application-controller
              namespace: openshift-gitops
        - complianceType: musthave
          objectDefinition:
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              name: argocd-monitoring-admin
              namespace: testapp-threepilars-app
            rules:
            - apiGroups:
              - monitoring.coreos.com
              resources:
              - servicemonitors
              - prometheusrules
              - podmonitors
              verbs:
              - '*'
        - complianceType: musthave
          objectDefinition:
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              name: argocd-monitoring-admin
              namespace: testapp-threepilars-app
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: argocd-monitoring-admin
            subjects:
            - kind: ServiceAccount
              name: acm-openshift-gitops-argocd-application-controller
              namespace: openshift-gitops
